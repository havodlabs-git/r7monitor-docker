services:
  # ─────────────────────────────────────────────
  # Banco de dados PostgreSQL
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: r7monitor
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: r7monitor
    volumes:
      - db_data:/var/lib/postgresql/data
      # Migração automática na primeira inicialização
      - ./backend/drizzle/migrations/0000_init.sql:/docker-entrypoint-initdb.d/0000_init.sql:ro
    networks:
      - r7net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r7monitor -d r7monitor"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Backend Node.js (API tRPC)
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - r7net
    ports:
      - "3000:3000"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Frontend React (Vite build + Nginx HTTPS)
  # O Nginx faz proxy reverso de /api/* → api:3000
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    environment:
      BACKEND_HOST: api
      BACKEND_PORT: 3000
    volumes:
      # Montar os certificados SSL do host (fullchain.pem + privkey.pem)
      - ${CERTS_PATH:-./certs}:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - r7net
    ports:
      - "443:443"
    restart: unless-stopped

networks:
  r7net:
    driver: bridge

volumes:
  db_data:
