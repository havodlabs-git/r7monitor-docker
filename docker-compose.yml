version: "3.9"

services:
  # ─── Base de dados MySQL ──────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: r7monitor-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-r7monitor}
      MYSQL_USER: ${MYSQL_USER:-r7monitor}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/drizzle/migrations/0000_init.sql:/docker-entrypoint-initdb.d/0000_init.sql:ro
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - r7monitor

  # ─── Backend Node.js / Express / tRPC ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: r7monitor-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-r7monitor}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-r7monitor}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-80},http://frontend:80
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - r7monitor
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Frontend React / Vite / Nginx ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.compose
    container_name: r7monitor-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - r7monitor

volumes:
  db_data:

networks:
  r7monitor:
    driver: bridge
