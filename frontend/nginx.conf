upstream api_backend {
    server ${BACKEND_HOST}:${BACKEND_PORT};
    keepalive 32;
}

server {
    listen 443 ssl;
    server_name _;

    # Ocultar versão do nginx
    server_tokens off;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    keepalive_timeout   75s;
    keepalive_requests  1000;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header X-XSS-Protection             "1; mode=block"                       always;
    add_header Strict-Transport-Security    "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options       "nosniff"                             always;
    add_header X-Frame-Options              "SAMEORIGIN"                          always;
    add_header Referrer-Policy              "no-referrer"                         always;
    add_header Cross-Origin-Opener-Policy   "same-origin"                         always;
    add_header Cross-Origin-Resource-Policy "same-origin"                         always;
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # ── Proxy /api → backend ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection           "";
        proxy_set_header   Host                 $http_host;
        proxy_set_header   X-Forwarded-Host     $http_host;
        proxy_set_header   X-Forwarded-Proto    https;
        proxy_set_header   X-Real-IP            $remote_addr;
        proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_hide_header  X-XSS-Protection;
        proxy_hide_header  Strict-Transport-Security;
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  X-Content-Type-Options;
        proxy_hide_header  Referrer-Policy;
        proxy_hide_header  Cross-Origin-Opener-Policy;
        proxy_hide_header  Cross-Origin-Resource-Policy;
        proxy_hide_header  Content-Security-Policy;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_redirect     off;
    }

    # ── SPA fallback ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Páginas de erro ─────────────────────────────────────────────────────
    error_page 404              /404.html;
    error_page 500 502 503 504  /50x.html;
    location = /404.html { internal; }
    location = /50x.html { internal; }
}
